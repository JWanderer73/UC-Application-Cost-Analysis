<!DOCTYPE html>
<html>
<head>

<title>Cost Calculator</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#b7c8d6;
}

/* PAGE LAYOUT */

.container{
    display:grid;
    grid-template-columns: 300px 1fr;
    height:100vh;
}

/* LEFT SIDE */

.sidebar{
    padding:40px;
}

.label{
    background:#7da0c4;
    padding:10px;
    margin-top:20px;
    text-align:center;
    font-weight:bold;
}

select{
    width:100%;
    padding:15px;
    margin-top:10px;
    font-size:16px;
}

/* RIGHT SIDE */

.main{
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:600px;
    background:#2f5d93;
    border-radius:40px;
    padding:40px;
}

/* RESULT BOXES */

.result{
    background:#cbb6d8;
    color:white;
    text-align:center;
    padding:20px;
    border-radius:20px;
    font-size:28px;
    margin-bottom:30px;
}

.row{
    display:flex;
    gap:20px;
}

.box{
    flex:1;
    background:#e58ec0;
    padding:20px;
    border-radius:20px;
    text-align:center;
    font-size:20px;
    color:white;
}

.footer-note {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    font-size: 13px;
    color: #555;
    font-style: italic;
    pointer-events: none; /* Ensures it doesn't block clicks on buttons */
}

</style>
</head>


<body>

<h1 style="text-align:center;">COST CALCULATOR</h1>

<div class="container">

<!-- LEFT SIDE -->
<div class="sidebar">

<div class="label">YEAR</div>
<select id="year" onchange="calculate()">
<option>2026</option>
<option>2027</option>
<option>2028</option>
<option>2029</option>
<option>2030</option>
</select>

<div class="label">UC SCHOOL</div>
<select id="school" onchange="calculate()">
  <option>Berkeley</option>
  <option>Los Angeles</option>
  <option>San Diego</option>
  <option>Davis</option>
  <option>Irvine</option>
  <option>Riverside</option>
  <option>Santa Barbara</option>
  <option>Santa Cruz</option>
  <option>Merced</option>
</select>

</div>


<!-- RIGHT SIDE -->

<div class="main">

<div class="card">

<div class="result" id="total">
TOTAL COST: $0
</div>

<div class="row">

<div class="box" id="apFeeBox">
PREDICTED AP EXAM COST: $0
</div>

<div class="box">
Number of AP Exams:
<br><br>
<input id="exams" type="number" value="0" style="width:80px;font-size:20px;" oninput="calculate()">
</div>

</div>

<br>

<div class="box" id="ucFeeBox">
PREDICTED UC APPLICATION FEE: $0
</div>

</div>

</div>

</div>

<script>

let ap_year_fee_dict = {};
let uc_year_fee_dict = {};

async function initializeData() {
    try {
        const apData = await loadCSV("ap_exam_fee_predictions_inflation.csv");
        const ucData = await loadCSV("uc_application_fee_predictions.csv");

        // Parse AP Data (Assuming Year is col 0, Berkeley is col 1)
        apData.slice(1).forEach(r => {
            if(r[0]) ap_year_fee_dict[r[0].trim()] = parseFloat(r[1]);
        });

        // Parse UC Data (Assuming Year is col 0, Fee is col 1)
        ucData.slice(1).forEach(r => {
            if(r[0]) uc_year_fee_dict[r[0].trim()] = parseFloat(r[1]);
        });

        // Run initial calculation
        calculate();
    } 
    catch (e) {
        console.log("Files not found, using hardcoded values")
        ap_year_fee_dict = {
            2026: 100.41662422551644,
            2027: 98.93785995278313,
            2028: 97.45909568005027,
            2029: 95.98033140731695,
            2030: 94.50156713458364
        };

        uc_year_fee_dict = {
            2026: 83.3328677867164,
            2027: 83.2339703447742,
            2028: 83.13507290283204,
            2029: 83.03617546088987,
            2030: 82.93727801894767
        };
    }
}

async function loadCSV(name) {
    let response = await fetch(name);
    let text = await response.text();
    // Split by line, then split by comma
    return text.split("\n").map(r => r.split(","));
}

function calculate() {
    let year = document.getElementById("year").value;
    console.log("Looking for year:", year);
    console.log("Current dictionary:", ap_year_fee_dict);
    let exams = Number(document.getElementById("exams").value);

    // Get prices from our pre-loaded dictionaries
    let apPrice = ap_year_fee_dict[year] || 1; // fallback to 1
    let ucFee = uc_year_fee_dict[year] || 1;  // fallback to 1

    let apTotal = exams * apPrice;
    let grandTotal = apTotal + ucFee;

    // Update UI
    document.getElementById("apFeeBox").innerHTML = `PREDICTED AP EXAM COST: $${apPrice.toFixed(2)}`;
    document.getElementById("ucFeeBox").innerHTML = `PREDICTED UC APPLICATION FEE: $${ucFee.toFixed(2)}`;
    document.getElementById("total").innerHTML = `TOTAL COST: $${grandTotal.toFixed(2)}`;
}

// Call the initializer
initializeData();
</script>


<div class="footer-note">
    (Prices in 2024 dollars; all UC schools have the same application fee)
</div>

</body>
</html>
